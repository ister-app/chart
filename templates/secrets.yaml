{{/*
All Secrets the chart manages itself, in one file so that the checksum/secrets pod
annotation on the server covers every credential it consumes.

Passwords left empty in values are generated once and then preserved across upgrades
via `lookup` — without that, every `helm upgrade` would mint a new password and lock
the app out of its own database.
*/}}
{{- $fullname := include "ister.fullname" . }}
{{- $labels := include "ister.labels" (dict "ctx" . "component" "secrets") }}

{{/* ---------- Server (TMDB) ---------- */}}
{{- if not .Values.server.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-server
  labels:
    {{- $labels | nindent 4 }}
type: Opaque
stringData:
  tmdb-api-key: {{ required "server.tmdbApiKey is required unless server.existingSecret is set" .Values.server.tmdbApiKey | quote }}
{{- end }}

{{/* ---------- Typesense ---------- */}}
{{- if and .Values.typesense.enabled (not .Values.typesense.existingSecret) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-typesense" $fullname) }}
{{- $apiKey := .Values.typesense.apiKey }}
{{- if not $apiKey }}
{{- $apiKey = (get (default dict $existing.data) "api-key" | b64dec) | default (randAlphaNum 48) }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-typesense
  labels:
    {{- $labels | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ $apiKey | quote }}
{{- end }}

{{/* ---------- Database ---------- */}}
{{- if and (eq .Values.database.mode "internal") (not .Values.database.internal.existingSecret) }}
{{- $secretName := printf "%s-database-app" $fullname }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $password := .Values.database.internal.password }}
{{- if not $password }}
{{- $password = (get (default dict $existing.data) "password" | b64dec) | default (randAlphaNum 32) }}
{{- end }}
---
# Same keys as a CNPG-generated <cluster>-app Secret, so the server and the Flyway
# job consume the database identically in every mode.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- $labels | nindent 4 }}
type: Opaque
stringData:
  host: {{ printf "%s-database" $fullname | quote }}
  port: "5432"
  dbname: {{ .Values.database.internal.dbName | quote }}
  user: {{ .Values.database.internal.user | quote }}
  password: {{ $password | quote }}
{{- end }}

{{- if and (eq .Values.database.mode "external") (not .Values.database.external.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-database-app
  labels:
    {{- $labels | nindent 4 }}
type: Opaque
stringData:
  host: {{ required "database.external.host is required" .Values.database.external.host | quote }}
  port: {{ .Values.database.external.port | toString | quote }}
  dbname: {{ .Values.database.external.dbName | quote }}
  user: {{ .Values.database.external.user | quote }}
  password: {{ required "database.external.password is required unless database.external.existingSecret is set" .Values.database.external.password | quote }}
{{- end }}

{{/* ---------- CNPG backup: S3 credentials ---------- */}}
{{- if and (eq .Values.database.mode "cnpg") .Values.database.cnpg.backup.enabled (not .Values.database.cnpg.backup.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-backup-s3
  labels:
    {{- $labels | nindent 4 }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ required "database.cnpg.backup.accessKeyId is required unless backup.existingSecret is set" .Values.database.cnpg.backup.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ required "database.cnpg.backup.secretAccessKey is required unless backup.existingSecret is set" .Values.database.cnpg.backup.secretAccessKey | quote }}
{{- end }}

{{/* ---------- External RabbitMQ ---------- */}}
{{/*
The old chart referenced a Secret here that nothing created, so an external broker
always failed with CreateContainerConfigError. This is that missing Secret.
*/}}
{{- if and (not .Values.rabbitmq.enabled) (not .Values.externalRabbitmq.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-rabbitmq
  labels:
    {{- $labels | nindent 4 }}
type: Opaque
stringData:
  rabbitmq-password: {{ required "externalRabbitmq.password is required unless externalRabbitmq.existingSecret is set" .Values.externalRabbitmq.password | quote }}
{{- end }}
