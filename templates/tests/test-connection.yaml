apiVersion: v1
kind: Pod
metadata:
  name: {{ include "ister.fullname" . }}-test-connection
  labels:
    {{- include "ister.labels" (dict "ctx" . "component" "test") | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  containers:
    - name: check
      image: curlimages/curl:8.11.1
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
      command:
        - sh
        - -c
        - |
          set -eu
          echo "server health:"
          curl -fsS "http://{{ include "ister.fullname" . }}-server:{{ .Values.server.managementPort }}{{ .Values.server.probes.path }}"
          echo
          echo "website:"
          curl -fsS -o /dev/null -w '%{http_code}\n' "http://{{ include "ister.fullname" . }}-website:8080/"
          {{- if .Values.typesense.enabled }}
          echo "typesense health:"
          curl -fsS "http://{{ include "ister.fullname" . }}-typesense:{{ .Values.typesense.port }}/health"
          echo
          {{- end }}
