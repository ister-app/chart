apiVersion: v1
kind: Pod
metadata:
  name: {{ include "ister.fullname" . }}-test-connection
  labels:
    {{- include "ister.labels" (dict "ctx" . "component" "test") | nindent 4 }}
  annotations:
    helm.sh/hook: test
    # No hook-succeeded: that deletes the pod the instant it passes, and then
    # `helm test --logs` (how CI runs it) races to fetch logs from a pod that is
    # already gone — "pods ... not found", a failure on a green test. Keep the pod
    # after success; before-hook-creation still clears it on the next test run.
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  containers:
    - name: check
      image: {{ include "ister.image" (dict "ctx" . "image" .Values.tests.image) | quote }}
      imagePullPolicy: {{ .Values.tests.image.pullPolicy }}
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
      command:
        - sh
        - -c
        - |
          set -eu
          SERVER="http://{{ include "ister.fullname" . }}-server"

          # Actuator is on the management port and is NOT behind server.contextPath.
          # Its health indicators cover the database and RabbitMQ.
          echo "==> server health"
          curl -fsS "$SERVER:{{ .Values.server.managementPort }}{{ .Values.server.probes.path }}"
          echo

          # The document a client fetches first: name, OIDC issuer, API URL.
          echo "==> /.well-known/ister"
          curl -fsS "$SERVER:8080{{ .Values.server.contextPath }}/.well-known/ister"
          echo

          # getServerInfo is the only unauthenticated GraphQL query, and it reads the
          # node registry from the database. A 200 here proves Postgres is up, Flyway
          # migrated the schema, and the server registered itself on startup — which is
          # far more than "the port is open".
          echo "==> GraphQL getServerInfo"
          body='{"query":"{ getServerInfo { name url openIdUrl nodes { id name } } }"}'
          out=$(curl -fsS -X POST "$SERVER:8080{{ .Values.server.contextPath }}/graphql" \
            -H 'Content-Type: application/json' -d "$body")
          echo "$out"
          # GraphQL reports failures in a 200 body, so a bare curl -f is not enough.
          case "$out" in
            *'"errors"'*) echo "getServerInfo returned errors"; exit 1 ;;
            *'"name"'*) ;;
            *) echo "unexpected getServerInfo response"; exit 1 ;;
          esac

          echo "==> website"
          curl -fsS -o /dev/null -w 'HTTP %{http_code}\n' \
            "http://{{ include "ister.fullname" . }}-website:8080/"
          {{- if .Values.typesense.enabled }}

          echo "==> typesense health"
          curl -fsS "http://{{ include "ister.fullname" . }}-typesense:{{ .Values.typesense.port }}/health"
          echo
          {{- end }}

          echo "==> all checks passed"
