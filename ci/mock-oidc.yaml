# A stand-in OIDC issuer for the e2e test. NOT part of the chart — CI infrastructure only.
#
# The server needs a real issuer because scanLibrary and every content query are
# @PreAuthorize("hasRole('user')"). OIDCSecurityConfig reads roles from a flat "roles"
# claim (JwtGrantedAuthoritiesConverter, authority prefix ROLE_) and does not validate
# an audience, so a token with {"roles":["user"]} from any issuer is enough. That makes
# a mock issuer sufficient; a full Keycloak would only be slower.
#
# mock-oauth2-server derives the `iss` claim from the request's Host header. The token
# must therefore be requested with Host: mock-oidc:8080 so that `iss` matches the
# OIDC_URL the server validates against. ci/e2e.sh does exactly that.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-oidc
  labels:
    app: mock-oidc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-oidc
  template:
    metadata:
      labels:
        app: mock-oidc
    spec:
      containers:
        - name: mock-oauth2-server
          image: ghcr.io/navikt/mock-oauth2-server:2.1.10
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: JSON_CONFIG
              value: |
                {
                  "tokenCallbacks": [
                    {
                      "issuerId": "default",
                      "tokenExpiry": 3600,
                      "requestMappings": [
                        {
                          "requestParam": "scope",
                          "match": "ister",
                          "claims": {
                            "sub": "ci-user",
                            "roles": ["user"]
                          }
                        }
                      ]
                    }
                  ]
                }
          readinessProbe:
            httpGet:
              path: /default/.well-known/openid-configuration
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mock-oidc
  labels:
    app: mock-oidc
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: mock-oidc
