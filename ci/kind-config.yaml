kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraMounts:
      # The media fixtures, generated by testdata/create_mkv.sh before the cluster
      # is created. The chart mounts them into the server as hostPath volumes, so
      # they have to exist inside the kind node, not just on the runner.
      - hostPath: ./testdata
        containerPath: /testdata
        readOnly: true
