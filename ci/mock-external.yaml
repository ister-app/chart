# A WireMock stand-in for every external metadata source. NOT part of the chart — CI
# infrastructure only.
#
# The server's metadata workers call TMDB, MusicBrainz, Cover Art Archive, Open Library,
# Wikidata/Wikipedia, Wikimedia Commons and iTunes. In CI those would need internet and a
# real TMDB key, and would be flaky and rate-limited. All their base URLs are configurable
# (see server.extraEnv in ci/values-ci.yaml), so this one pod serves them all, each under
# its own path prefix:
#
#   /tmdb/...        TMDB API           /musicbrainz/...  MusicBrainz
#   /openlibrary/... Open Library       /wikidata/...     Wikidata entity + api
#   /wikipedia/...   Wikipedia summary  /itunes/...       iTunes podcast directory
#   /img/...         every image download (returns a real JPEG)
#
# The stubs are fixture-aware: every movie/show/book fixture has its own search +
# details stub pair carrying the real title and the .nfo plot, so enriched metadata
# reads like real media (screenshots included) while staying fully offline. Search
# catchalls return "no results" as the safe default so unforeseen calls skip
# cleanly instead of dead-lettering — a new fixture therefore needs a new stub pair.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-external-mappings
data:
  # One search + one details stub per movie fixture. The search query is the bare
  # scanned name (the year travels as primary_release_year), and a single-result
  # response is accepted without a title check, so equalTo on the name is enough.
  # Details must carry release_date AND overview or the worker discards the result.
  # The titles/overviews mirror the fixture .nfo files, so screenshots and e2e data
  # read like real media. A new movie fixture needs a new stub pair here: the
  # search catchall below returns no results, and without TMDB enrichment a movie
  # is skipped (on servers without movie-nfo scanning it then never reaches the
  # search index either).
