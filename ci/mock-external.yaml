  # One templated stub per show, deliberately without a "name" field: the worker
  # stores the missing name as a null title, so the UI falls back to the episode's
  # own .nfo title while the overview still proves enrichment ran. (Returning
  # "Episode {n}" instead would stick for the nl fetch — the worker only nulls the
  # language-matching placeholder, "Aflevering %d" for nl.)
  tmdb-fixture-episodes.json: |
    {
      "mappings": [
        {
          "request": {
            "method": "GET",
            "urlPathPattern": "/tmdb/3/tv/201/season/[0-9]+/episode/[0-9]+"
          },
          "response": {
            "status": 200,
            "headers": {
              "Content-Type": "application/json"
            },
            "body": "{\"id\":{{request.path.[3]}}{{request.path.[5]}}{{request.path.[7]}},\"episode_number\":{{request.path.[7]}},\"overview\":\"Another day of survival and cooperation inside the colony.\",\"air_date\":\"2015-03-10\",\"still_path\":\"/episode-still.jpg\"}",
            "transformers": [
              "response-template"
            ]
          }
        },
        {
          "request": {
            "method": "GET",
            "urlPathPattern": "/tmdb/3/tv/202/season/[0-9]+/episode/[0-9]+"
          },
          "response": {
            "status": 200,
            "headers": {
              "Content-Type": "application/json"
