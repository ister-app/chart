---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-external
  labels:
    app: mock-external
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-external
  template:
    metadata:
      labels:
        app: mock-external
    spec:
      containers:
        - name: wiremock
          image: wiremock/wiremock:3.13.2
          args: ["--port", "8080", "--global-response-templating", "--disable-banner"]
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: mappings
              mountPath: /home/wiremock/mappings
              readOnly: true
          readinessProbe:
            httpGet:
              path: /__admin/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
          resources:
            requests:
              cpu: 25m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: mappings
          configMap:
            name: mock-external-mappings
---
apiVersion: v1
kind: Service
metadata:
  name: mock-external
  labels:
    app: mock-external
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: mock-external
