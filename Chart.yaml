apiVersion: v2
name: ister
description: Ister media server — Spring Boot backend + web frontend, with PostgreSQL, RabbitMQ and Typesense
type: application
kubeVersion: ">=1.25.0-0"

# Chart version. Bumped by .github/workflows/release.yml on every merge that touches the
# chart — do not edit by hand.
version: 0.3.0

# The server image version this chart deploys, mirrored onto pods as app.kubernetes.io/version.
# Derived from values.yaml server.image.tag by the release workflow, so it cannot drift from it.
# The website and migrations images have their own version lines in values.yaml.
appVersion: "2.0.0"

home: https://github.com/ister-app
sources:
  - https://github.com/ister-app/server
  - https://github.com/ister-app/website
keywords:
  - media
  - media-server
  - streaming

dependencies:
  # Bitnami RabbitMQ. Enabled by default; set rabbitmq.enabled=false and fill in
  # externalRabbitmq.* to point at an existing broker instead.
  - name: rabbitmq
    version: "16.0.14"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: rabbitmq.enabled
