name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  # release.yml runs these same jobs on the merged commit before it publishes anything,
  # so a chart can never be released on a red e2e.
  workflow_call:
  # So the server/player repos can re-run this after publishing new :main images.
  repository_dispatch:
    types: [images-published]
  schedule:
    # The dev/CI profiles deploy the mutable :main tags, and the kind + actions environment
    # moves under us regardless. Either can turn a green CI red without anyone touching this
    # repo, so catch it on a schedule rather than on the next release.
    - cron: "0 5 * * 1"

env:
  HELM_VERSION: v3.16.3

jobs:
  lint:
    name: Lint and render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - run: helm dependency build

      - name: Lint every profile
        run: |
          helm lint . -f values-dev.yaml --set server.tmdbApiKey=x
          helm lint . -f values-production.example.yaml --set server.tmdbApiKey=x
          helm lint . -f ci/values-ci.yaml

      - name: Render every profile
        run: |
          # values.schema.json and the template guards do the real work here; this just
          # makes sure each profile still produces parseable YAML.
          helm template ister . -f values-dev.yaml --set server.tmdbApiKey=x > /dev/null
          helm template ister . -f values-production.example.yaml --set server.tmdbApiKey=x > /dev/null
          helm template ister . -f ci/values-ci.yaml > /dev/null
          # All-external: no bundled datastores at all.
          helm template ister . \
            --set server.tmdbApiKey=x --set server.oidc.url=https://oidc.example/realms/a \
            --set database.mode=external --set database.external.host=pg \
            --set database.external.password=p \
            --set rabbitmq.enabled=false --set externalRabbitmq.host=rmq \
            --set externalRabbitmq.password=p \
            --set typesense.enabled=false --set typesense.external.host=ts \
            --set typesense.external.existingSecret=ts > /dev/null

      # kubeconform's image has no helm, so render on the runner first (helm is set up above,
      # and `dependency build` already resolved the subchart) and hand the file to the
      # container's own /kubeconform entrypoint — piping helm *inside* the image cannot work.
      - name: Render for schema validation
        run: helm template ister . -f ci/values-ci.yaml > kubeconform-manifests.yaml

      - name: Validate rendered manifests against Kubernetes schemas
        uses: docker://ghcr.io/yannh/kubeconform:latest-alpine
        with:
          args: -strict -summary -ignore-missing-schemas kubeconform-manifests.yaml

  e2e:
    name: End-to-end on kind
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          path: chart

      # The media fixtures are not committed (testdata/.gitignore excludes *.mkv), so they
      # have to be generated with ffmpeg. That costs ~4.5 minutes, which is far too much to
      # pay on every run — so cache the result. The key covers both the generator script and
      # the testdata commit, so the fixtures are rebuilt exactly when either changes.
      - uses: actions/checkout@v4
        with:
          repository: ister-app/testdata
          path: testdata

      - name: Resolve the testdata revision (for the cache key)
        id: testdata
        run: echo "sha=$(git -C testdata rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Restore media fixtures
        id: fixtures
        uses: actions/cache@v4
        with:
          path: testdata/node1/disk1
          key: fixtures-${{ steps.testdata.outputs.sha }}-${{ hashFiles('testdata/create_mkv.sh') }}

      # Only on a cache miss — which also means ffmpeg is only installed when it is used.
      - name: Generate media fixtures
        if: steps.fixtures.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          cd testdata
          # create_mkv.sh walks every node*/disk* it finds and encodes a 3-minute video per
          # episode. The e2e only mounts node1/disk1/{tv,movies}, so drop the rest rather
          # than spend minutes encoding video nothing will ever read.
          rm -rf node2 node1/disk2 node1/disk1/music node1/disk1/books
          ./create_mkv.sh

      - name: Show the fixtures
        run: |
          echo "cache hit: ${{ steps.fixtures.outputs.cache-hit == 'true' }}"
          echo "mkv files: $(find testdata/node1/disk1 -name '*.mkv' | wc -l)"

      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      # The rabbitmq subchart is a small OCI pull, but it is free to keep.
      - name: Cache the chart dependencies
        uses: actions/cache@v4
        with:
          path: chart/charts
          key: helmdeps-${{ hashFiles('chart/Chart.lock') }}

      # The container images (~1.5 GB in total, of which the native server image is ~690 MB)
      # are deliberately NOT cached. Restoring them from the Actions cache is about as slow
      # as pulling them from a registry the runner has a fast path to, and it would eat most
      # of the 10 GB cache budget that the fixtures actually benefit from.
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          config: chart/ci/kind-config.yaml
          cluster_name: ister

      - name: Deploy the mock OIDC issuer
        run: |
          kubectl create namespace ister
          kubectl apply -n ister -f chart/ci/mock-oidc.yaml
          kubectl wait -n ister --for=condition=Available deploy/mock-oidc --timeout=120s

      - name: Install the chart
        working-directory: chart
        run: |
          helm dependency build
          helm upgrade --install ister . -n ister -f ci/values-ci.yaml --wait --timeout 15m

      - name: Wait for everything to be ready
        run: |
          kubectl wait -n ister --for=condition=Ready pod --all --timeout=10m
          kubectl get pods -n ister

      - name: helm test (unauthenticated smoke)
        run: helm test ister -n ister --logs

      - name: End-to-end (scan and index real media)
        working-directory: chart
        run: ./ci/e2e.sh ister ister

      - name: Diagnostics
        if: failure()
        run: |
          echo "===== pods ====="
          kubectl get pods -n ister -o wide
          echo "===== events ====="
          kubectl get events -n ister --sort-by=.lastTimestamp | tail -40
          echo "===== describe not-ready pods ====="
          kubectl get pods -n ister -o name | while read -r p; do
            kubectl describe -n ister "$p" | sed -n '/Events:/,$p'
          done
          echo "===== logs (all containers, including init) ====="
          kubectl get pods -n ister -o name | while read -r p; do
            echo "----- $p"
            # --all-containers alone skips init containers, and the flyway/wait-for-db
            # init containers are exactly where a broken install shows itself.
            kubectl logs -n ister "$p" --all-containers --prefix --tail=100 || true
            for c in wait-for-db flyway; do
              kubectl logs -n ister "$p" -c "$c" --tail=50 2>/dev/null | sed "s/^/[$c] /" || true
            done
          done
